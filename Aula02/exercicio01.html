<body>
    <h1><mark> Manipulação de elementos (tags)</mark> do html através do js </h1>
    <hr>

    <div>
        <p>Lorem, ipsum. </p>

        <hr>

        <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Possimus </p>

        <p>Lorem ipsum dolor sit amet.</p>
    
    </div>


    <script>
        const tags_p = document.getElementsByTagName('p')
        console.log(tags_p);
        let tag_p_1 = tags_p[0]
        console.log(tag_p_1);
        tag_p_1.style.backgroundColor="purple";
        tag_p_1.style.color="white";
        tag_p_1.style.textAlign="center";
        tag_p_1.style.fontSize="25pt";

        console.log(tags_p);
        let tag_p_2 = tags_p[1]
        console.log(tag_p_2);
        tag_p_2.style.backgroundColor="red";
        tag_p_2.style.color="white";
        tag_p_2.style.textAlign="center";
        tag_p_2.style.fontSize="25pt";

        console.log(tags_p);
        let tag_p_3 = tags_p[2]
        console.log(tag_p_3);
        tag_p_3.style.backgroundColor="orange";
        tag_p_3.style.color="white";
        tag_p_3.style.textAlign="center";
        tag_p_3.style.fontSize="25pt";

        tag_p_3.innerText = "A turma do dev e espetacula demais."

        document.write('<h2>gg, <mark>Javascript e muito legal</mark></h2>')
    </script>
    
</body>
