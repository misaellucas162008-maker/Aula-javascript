<body>
    <h1><mark> Manipulação de elementos (tags)</mark> do html através do js </h1>
    <hr>

    <div>
        <img src="../img/corinthians.jpg" alt="Time do corinthians" width="500px" title="Corinthians">
        <button onclick="Trocar_img()">Trocar imagem</button>
        <li><a href="index.html" target="_blank">Sair</a></li>
    </div>


    <script>
        function Trocar_img (){
            const tags_i = document.getElementsByTagName('img'); 

            console.log(tags_i)
            let tags_i_1 = tags_i[0]
            if(tags_i_1.title=="Corvette"){
                tags_i_1.src="../img/corinthians.jpg"
                tags_i_1.title = "Corinthians" 
            
            }else{
                tags_i_1.src="../img/corvette.jpg"
                tags_i_1.title = "Corvette"       
            }
        }
        
        


    </script>
    
</body>
