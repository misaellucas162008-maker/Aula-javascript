<body>
    <h1><mark> Manipulação de elementos (tags)</mark> do html através do js </h1>
    <hr>

    <input type="number" name="num1" id="num1" placeholder="Digite o primeiro numero">
    <input type="number" name="num2" id="num2" placeholder="Digite o segundo numero">
    <input type="button" onclick="Soma();" value="Soma">
    <li><a href="index.html" target="_blank">Sair</a></li>

    <p><Span id="resultado"></Span></p>


    <script>
        function Soma (){
            let valor1 = document.getElementById('num1')
            let valor2 = document.getElementById('num2')
            let Soma = Number(valor1.value) + Number(valor2.value)
            document.getElementById('resultado').innerText ="O resultado é "+Soma
        }
    


    </script>
    
</body>
